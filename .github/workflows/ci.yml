name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests with coverage
        run: mvn verify

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Check coverage threshold (services only)
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()

          missed_total, covered_total = 0, 0
          for cls in root.iter('class'):
              name = cls.attrib.get('name', '')
              if not name.endswith('Service'):
                  continue
              for counter in cls.findall('counter'):
                  if counter.attrib['type'] == 'INSTRUCTION':
                      missed_total += int(counter.attrib['missed'])
                      covered_total += int(counter.attrib['covered'])

          total = missed_total + covered_total
          pct = (covered_total / total * 100) if total > 0 else 0
          threshold = 80.0
          print(f'Service coverage: {pct:.1f}% (threshold {threshold}%)')
          if pct < threshold:
              raise SystemExit(f'FAILED: {pct:.1f}% is below threshold {threshold}%')
          EOF
